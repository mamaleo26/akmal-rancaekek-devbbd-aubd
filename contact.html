<div class="card">
    <h2>Hubungi Saya</h2>
    <form id="contact-form" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label>Nama Lengkap</label>
            <input type="text" id="name" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            <small id="err-name" class="error" style="color:red;"></small>
        </div>
        <div>
            <label>Email</label>
            <input type="email" id="email" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            <small id="err-email" class="error" style="color:red;"></small>
        </div>
        <div>
            <label>Pesan</label>
            <textarea id="message" rows="5" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
            <small id="err-msg" class="error" style="color:red;"></small>
        </div>
        <button type="submit" style="background: #2563eb; color:white; border:none; padding: 15px; border-radius: 8px; cursor:pointer; font-weight:bold;">Kirim Pesan</button>
    </form>
</div>
