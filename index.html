<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akmal Portfolio | Professional CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --g: rgba(255,255,255,0.05); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans', sans-serif; background:var(--bg); color:#fff; overflow-x:hidden; }

        /* Navigation */
        nav { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,0.9); backdrop-filter:blur(10px); padding:8px 15px; border-radius:50px; border:1px solid rgba(255,255,255,0.1); z-index:1000; display:flex; gap:5px; box-shadow:0 10px 30px rgba(0,0,0,0.5); max-width:95vw; overflow-x:auto; scrollbar-width:none; }
        nav a { text-decoration:none; color:#94a3b8; padding:10px 18px; border-radius:30px; font-weight:600; font-size:0.85rem; transition:0.3s; white-space:nowrap; display:flex; align-items:center; gap:8px; }
        nav a.active { background:var(--p); color:#fff; }

        /* Area Konten */
        main { padding:40px 5% 120px 5%; min-height:100vh; display:flex; justify-content:center; align-items:center; width:100%; }
        #content-area { width:100%; max-width:1100px; }

        /* Style Kartu (Global untuk semua halaman luar) */
        .glass-card { background:var(--g); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:30px; padding:40px; animation:fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<main>
    <div id="content-area">
        </div>
</main>

<nav id="navbar">
    <a href="#" data-page="home" class="active"><i class="fas fa-home"></i> Home</a>
    <a href="#" data-page="about"><i class="fas fa-user"></i> About</a>
    <a href="#" data-page="skills"><i class="fas fa-code"></i> Skills</a>
    <a href="#" data-page="education"><i class="fas fa-graduation-cap"></i> Edu</a>
    <a href="#" data-page="experience"><i class="fas fa-briefcase"></i> Project</a>
    <a href="#" data-page="contact"><i class="fas fa-envelope"></i> Contact</a>
</nav>

<script>
$(document).ready(function() {
    function loadPage(page) {
        $("#content-area").fadeOut(200, function() {
            $.get(page + ".html", function(data) {
                $("#content-area").html(data).fadeIn(400);
                if(page === 'contact') initForm(); // Panggil fungsi form jika di contact
            }).fail(function() {
                $("#content-area").html("<center><h2>Halaman " + page + ".html Belum Dibuat!</h2></center>").fadeIn();
            });
        });
    }

    $("#navbar a").click(function(e) {
        e.preventDefault();
        $("#navbar a").removeClass("active");
        $(this).addClass("active");
        loadPage($(this).data("page"));
    });

    loadPage("home"); // Load awal

    function initForm() {
        $("#name").val(localStorage.getItem("nama"));
        $("#contact-form").on("submit", function(e) {
            e.preventDefault();
            localStorage.setItem("nama", $("#name").val());
            alert("Berhasil disimpan!");
        });
    }
});
</script>
</body>
</html>
