<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Akmal SPA</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    color:white;
}

/* NAV */
nav{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:12px;
    border-radius:50px;
    display:flex;
    gap:10px;
    z-index:1000;
}
nav a{
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:20px;
}
nav a.active{
    background:cyan;
    color:black;
}

/* PAGE */
.page{
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* WARNA */
#home{background:#0f2027;}
#about{background:#ff512f;}
#skills{background:#11998e;}
#education{background:#333;}
#experience{background:#654ea3;}
#contact{background:#000428;}

/* CARD */
.card{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
}

/* FOTO */
.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid cyan;
    margin-bottom:20px;
}

/* SKILL */
.bar{
    background:#333;
}
.bar div{
    height:10px;
    width:0;
    background:cyan;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="page">
<div class="card">
<img src="profile.jpg" class="profile">
<h1>Akmal Syarif</h1>
<p>Web Developer</p>
</div>
</section>

<!-- ABOUT -->
<section id="about" class="page">
<div class="card">
<img src="profile.jpeg" class="profile">
<h2>Tentang Saya</h2>
<p>Saya adalah developer yang membuat website modern dan sistem informasi.</p>
</div>
</section>

<!-- SKILLS -->
<section id="skills" class="page">
<div class="card">
<h2>Skills</h2>

<p>HTML</p>
<div class="bar"><div data-width="90%"></div></div>

<p>CSS</p>
<div class="bar"><div data-width="80%"></div></div>

<p>JS</p>
<div class="bar"><div data-width="70%"></div></div>

</div>
</section>

<!-- EDUCATION -->
<section id="education" class="page">
<div class="card">
<h2>Pendidikan</h2>
<p>SMK Pasundan Rancaekek</p>
</div>
</section>

<!-- EXPERIENCE -->
<section id="experience" class="page">
<div class="card">
<h2>Pengalaman</h2>
<p>PKL Web Developer</p>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="page">
<div class="card">
<h2>Contact</h2>
<p>Instagram | WhatsApp</p>
</div>
</section>

<!-- NAV -->
<nav>
<a href="#" class="menu active" data-target="home">Home</a>
<a href="#" class="menu" data-target="about">About</a>
<a href="#" class="menu" data-target="skills">Skills</a>
<a href="#" class="menu" data-target="education">Edu</a>
<a href="#" class="menu" data-target="experience">Exp</a>
<a href="#" class="menu" data-target="contact">Contact</a>
</nav>

<script>
$(document).ready(function(){

$("#home").show();

$(".menu").click(function(e){
    e.preventDefault();

    let target=$(this).data("target");

    $(".menu").removeClass("active");
    $(this).addClass("active");

    $(".page").fadeOut(200);
    $("#"+target).delay(200).fadeIn(400);

    if(target==="skills"){
        $(".bar div").each(function(){
            let w=$(this).data("width");
            $(this).animate({width:w},1000);
        });
    }
});

});
</script>

</body>
</html>
